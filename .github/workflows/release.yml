name: Release

on:
  push:
    branches: [master, test]
    # Defensive: ignore tag pushes even though `branches:` already filters
    # them out. The version job's `git tag --list` reads the same tags, so
    # silently pushing a `v*` tag would still be safe — but this keeps the
    # trigger self-documenting.
    tags-ignore: ['v*']

concurrency:
  # Serialise releases across pushes. Newer pushes wait for the in-flight
  # release to finish — cancel-in-progress: false because we never want to
  # abandon a partially-shipping release.
  group: release
  cancel-in-progress: false

jobs:
  version:
    name: Compute version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      version: ${{ steps.compute.outputs.version }}
      prerelease: ${{ steps.compute.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - id: compute
        shell: bash
        run: |
          set -euo pipefail
          BRANCH="${GITHUB_REF#refs/heads/}"
          # master: vX.Y.Z (regular). test: vX.Y.Z-test.N (prerelease).
          if [ "$BRANCH" = "test" ]; then
            latest="$(git tag --list 'v*-test.*' --sort=-version:refname | head -n1 || true)"
            if [ -z "$latest" ]; then
              base="$(git tag --list 'v*' --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1 || true)"
              if [ -z "$base" ]; then
                next="v0.0.1-test.1"
              else
                next="${base}-test.1"
              fi
            else
              counter="${latest##*.}"
              base="${latest%-test.*}"
              next="${base}-test.$((counter + 1))"
            fi
            prerelease="true"
          else
            latest="$(git tag --list 'v*' --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1 || true)"
            if [ -z "$latest" ]; then
              next="v0.0.1"
            else
              ver="${latest#v}"
              IFS='.' read -r major minor patch <<<"$ver"
              next="v${major}.${minor}.$((patch + 1))"
            fi
            prerelease="false"
          fi
          echo "version=$next" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"
          echo "Branch=$BRANCH -> $next (prerelease=$prerelease)"

  build:
    name: Build ${{ matrix.target }}
    needs: version
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-linux-x64
            outfile: dist/bin/cc-linux-x64
          - target: bun-linux-arm64
            outfile: dist/bin/cc-linux-arm64
          - target: bun-linux-x64-musl
            outfile: dist/bin/cc-linux-x64-musl
          - target: bun-linux-arm64-musl
            outfile: dist/bin/cc-linux-arm64-musl
          - target: bun-windows-x64
            outfile: dist/bin/cc-windows-x64.exe
    steps:
      - uses: actions/checkout@v4
        with:
          # Build job only needs the working tree, not history. The version
          # job above is the one that needs fetch-depth: 0 for tag reads.
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup bun cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build bundle
        run: bun run build

      - name: Build standalone (${{ matrix.target }})
        env:
          BUN_COMPILE_TARGET: ${{ matrix.target }}
          BUN_COMPILE_OUTFILE: ${{ matrix.outfile }}
        run: bun run build:compile

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: cc-${{ needs.version.outputs.version }}-${{ matrix.target }}
          path: ${{ matrix.outfile }}
          if-no-files-found: error

  release:
    name: Publish release
    needs: [version, build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Defensive: refuse to publish on non-push events. The trigger is already
    # `on.push:` only, but if anyone later adds `pull_request` to `on:`, this
    # guard prevents creating a release on every PR.
    if: github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: dist/bin
          merge-multiple: true

      # Gate the release on all 5 expected outfiles being present. Without
      # this, a partial-failure matrix (e.g. 4/5 builds succeed) would still
      # ship a release tagged as the full version with one binary missing.
      # The list MUST match the build matrix `outfile` values above; if you
      # add a matrix entry, add it here too.
      - name: Verify all binaries are present
        shell: bash
        run: |
          set -euo pipefail
          expected=(
            "dist/bin/cc-linux-x64"
            "dist/bin/cc-linux-arm64"
            "dist/bin/cc-linux-x64-musl"
            "dist/bin/cc-linux-arm64-musl"
            "dist/bin/cc-windows-x64.exe"
          )
          missing=()
          for f in "${expected[@]}"; do
            if [ ! -f "$f" ]; then
              missing+=("$f")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "error: ${#missing[@]} binary/binarie(s) missing from the download:"
            for m in "${missing[@]}"; do
              echo "  - $m"
            done
            echo "refusing to publish a partial release. Check the build matrix for failures."
            exit 1
          fi
          echo "all ${#expected[@]} binaries present."

      # Refuse to silently reuse an existing tag. softprops/action-gh-release
      # reuses a tag if one matches tag_name; the version job computes `next`
      # from the latest tag, but doesn't check that `next` doesn't already
      # exist (e.g. from a different branch's history).
      - name: Verify tag does not already exist
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.version.outputs.version }}"
          if git rev-parse --verify "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "error: tag ${tag} already exists. Refusing to reuse."
            git log --oneline -1 "refs/tags/${tag}" || true
            exit 1
          fi
          echo "tag ${tag} is new."

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.version }}
          name: ${{ needs.version.outputs.version }}
          prerelease: ${{ needs.version.outputs.prerelease == 'true' }}
          generate_release_notes: true
          files: |
            dist/bin/cc-linux-x64
            dist/bin/cc-linux-arm64
            dist/bin/cc-linux-x64-musl
            dist/bin/cc-linux-arm64-musl
            dist/bin/cc-windows-x64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
