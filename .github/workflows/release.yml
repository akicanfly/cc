name: Release

on:
  push:
    branches: [master, test]
    tags-ignore: ['v*']

permissions:
  contents: write

jobs:
  version:
    name: Compute version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.compute.outputs.version }}
      prerelease: ${{ steps.compute.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - id: compute
        shell: bash
        run: |
          set -euo pipefail
          BRANCH="${GITHUB_REF#refs/heads/}"
          # master: vX.Y.Z (regular). test: vX.Y.Z-test.N (prerelease).
          if [ "$BRANCH" = "test" ]; then
            latest="$(git tag --list 'v*-test.*' --sort=-version:refname | head -n1 || true)"
            if [ -z "$latest" ]; then
              base="$(git tag --list 'v*' --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1 || true)"
              if [ -z "$base" ]; then
                next="v0.0.1-test.1"
              else
                next="${base}-test.1"
              fi
            else
              counter="${latest##*.}"
              base="${latest%-test.*}"
              next="${base}-test.$((counter + 1))"
            fi
            prerelease="true"
          else
            latest="$(git tag --list 'v*' --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1 || true)"
            if [ -z "$latest" ]; then
              next="v0.0.1"
            else
              ver="${latest#v}"
              IFS='.' read -r major minor patch <<<"$ver"
              next="v${major}.${minor}.$((patch + 1))"
            fi
            prerelease="false"
          fi
          echo "version=$next" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"
          echo "Branch=$BRANCH -> $next (prerelease=$prerelease)"

  build:
    name: Build ${{ matrix.target }}
    needs: version
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-linux-x64
            outfile: dist/bin/cc-linux-x64
          - target: bun-linux-arm64
            outfile: dist/bin/cc-linux-arm64
          - target: bun-linux-x64-musl
            outfile: dist/bin/cc-linux-x64-musl
          - target: bun-linux-arm64-musl
            outfile: dist/bin/cc-linux-arm64-musl
          - target: bun-windows-x64
            outfile: dist/bin/cc-windows-x64.exe
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build bundle
        run: bun run build

      - name: Build standalone (${{ matrix.target }})
        env:
          BUN_COMPILE_TARGET: ${{ matrix.target }}
          BUN_COMPILE_OUTFILE: ${{ matrix.outfile }}
        run: bun run build:compile

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: cc-${{ needs.version.outputs.version }}-${{ matrix.target }}
          path: ${{ matrix.outfile }}
          if-no-files-found: error

  release:
    name: Publish release
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: dist/bin
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.version }}
          name: ${{ needs.version.outputs.version }}
          prerelease: ${{ needs.version.outputs.prerelease == 'true' }}
          generate_release_notes: true
          files: |
            dist/bin/cc-linux-x64
            dist/bin/cc-linux-arm64
            dist/bin/cc-linux-x64-musl
            dist/bin/cc-linux-arm64-musl
            dist/bin/cc-windows-x64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
